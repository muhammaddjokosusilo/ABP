<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Online Media</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- <link rel="stylesheet" href="style.css"> -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<!-- Header -->
<div class="container py-3">
  <h2 class="fw-bold">
    <span class="text-primary">ONLINE</span> 
    <span class="text-warning">MEDIA</span>
  </h2>
</div>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
  <div class="container">
    <div class="collapse navbar-collapse">
      <ul class="navbar-nav">
        <li class="nav-item"><a class="nav-link active" href="#">Home</a></li>
        <li class="nav-item"><a class="nav-link" href="#">Strategy</a></li>
        <li class="nav-item"><a class="nav-link" href="#">Solusi</a></li>
        <li class="nav-item"><a class="nav-link" href="#">Marketing</a></li>
        <li class="nav-item"><a class="nav-link" href="#">Workshop</a></li>
        <li class="nav-item"><a class="nav-link" href="#">Our Work</a></li>
        <li class="nav-item"><a class="nav-link" href="#">Produk</a></li>
        <li class="nav-item"><a class="nav-link" href="#">Partner</a></li>
        <li class="nav-item"><a class="nav-link" href="#">Inspirasi</a></li>
        <li class="nav-item"><a class="nav-link" href="#">FAQ</a></li>
      </ul>
    </div>
  </div>
</nav>

<!-- Grid Section -->
<div class="container my-5">
  <div class="row g-4 justify-content-center">

    <div class="col-6 col-md-6 col-lg-6">
      <div class="box analytic">
        <i class="fa-solid fa-chart-pie"></i>
        <h5>Analytic</h5>
      </div>
    </div>

    <div class="col-6 col-md-6 col-lg-6">
      <div class="box creative">
        <i class="fa-sol2id fa-thermometer-half"></i>
        <h5>Creative</h5>
      </div>
    </div>

    <div class="col-6 col-md-6 col-lg-6">
      <div class="box development">
        <i class="fa-solid fa-desktop"></i>
        <h5>Development</h5>
      </div>
    </div>

    <div class="col-6 col-md-6 col-lg-6">
      <div class="box marketing">
        <i class="fa-solid fa-gears"></i>
        <h5>Marketing</h5>
      </div>
    </div>

    <div class="col-6 col-md-6 col-lg-6">
      <div class="box media">
        <i class="fa-solid fa-circle-play"></i>
        <h5>Media</h5>
      </div>
    </div>

    <div class="col-6 col-md-6 col-lg-6">
      <div class="box optimization">
        <i class="fa-solid fa-rocket"></i>
        <h5>Optimization</h5>
      </div>
    </div>

  </div>
</div>

</body>
</html>

<style>
    body {
        background-color: #f4f4f4;
    }

    .box {
        height: 150px;
        color: white;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        border-radius: 5px;
        transition: 0.3s ease;
        cursor: pointer;
    }

    .box i {
        font-size: 40px;
        margin-bottom: 10px;
    }

    .box:hover {
        transform: scale(1.05);
        opacity: 0.9;
    }

    /* Warna sesuai gambar */
    .analytic {
        background-color: #1abc9c;
    }

    .creative {
        background-color: #f39c12;
    }

    .development {
        background-color: #e74c3c;
    }

    .marketing {
        background-color: #3498db;
    }

    .media {
        background-color: #f1c40f;
    }

    .optimization {
        background-color: #2ecc71;
    }
</style>
