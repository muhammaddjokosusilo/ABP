<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online Media Landing Page</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="script.js"></script>
</head>
<body>

    <header>
        <div class="logo">ONLINE <span>MEDIA</span></div>
        <nav>
            <ul>
                <li><a href="#" class="active">Home</a></li>
                <li><a href="#">Strategy</a></li>
                <li><a href="#">Solusi</a></li>
                <li><a href="#">Marketing</a></li>
                <li><a href="#">Workshop</a></li>
                <li><a href="#">Our Work</a></li>
                <li><a href="#">Produk</a></li>
                <li><a href="#">Partner</a></li>
                <li><a href="#">Inspirasi</a></li>
                <li><a href="#">FAQ</a></li>
            </ul>
        </nav>
    </header>


    <div class="top-buttons-container">
        
        <div class="card analytic" id="btn-flex-toggle" style="text-align: center;">
            <i class="fas fa-chart-pie"></i>
            <h3 id="target-text">First Button</h3>
        </div>

        <div class="card" id="btn-change-color" style="background-color: #e67e22;">
            <i class="fas fa-lightbulb"></i>
            <h3>Second Button</h3>
        </div>

    </div>

    
    <main class="grid-container">
        <div class="card development">
            <i class="fas fa-desktop"></i>
            <h3>Development</h3>
        </div>
        <div class="card marketing">
            <i class="fas fa-cog"></i><i class="fas fa-cog small-cog"></i>
            <h3>Marketing</h3>
        </div>
        <div class="card media">
            <i class="fas fa-play-circle"></i>
            <h3>Media</h3>
        </div>
        <div class="card optimization">
            <i class="fas fa-rocket"></i>
            <h3>Optimization</h3>
        </div>
    </main>

</body>
</html>
